<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>멋진 여행지 추천</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>어디로 떠나볼까요?</h1>
      <p>당신을 위한 완벽한 여행지를 추천해 드립니다.</p>
    </header>

    <main class="container">
      <section class="card">
        <div class="card-content">
          <h2>제주도 푸른 밤</h2>
          <p>
            에메랄드빛 바다와 맛있는 음식이 가득한 제주도로 떠나보세요. 본문
            텍스트는 가독성이 좋은 Pretendard 폰트를 사용했습니다.
          </p>
          <button>더 알아보기</button>
        </div>
      </section>

      <section class="card">
        <div class="card-content">
          <h2>교토의 정취</h2>
          <p>
            전통과 현대가 공존하는 일본 교토의 고즈넉한 풍경을 즐겨보세요.
            여행의 설렘을 깔끔한 디자인에 담았습니다.
          </p>
          <button>더 알아보기</button>
        </div>
      </section>
    </main>
  </body>
</html>
